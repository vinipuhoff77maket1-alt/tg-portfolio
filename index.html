<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Motion Designer Portfolio</title>
    <!-- Safeguard against window.fetch read-only property errors in sandboxed iframes -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch:", e);
        }
      })();
    </script>
    <!-- Telegram Mini App WebApp script SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body class="bg-[#ECE5DD] text-[#332F2C]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
